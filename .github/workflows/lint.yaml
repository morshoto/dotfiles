name: "CI: Lint"

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Check flake
        run: nix flake check --all-systems --show-trace "path:$GITHUB_WORKSPACE"

      - name: Check formatting
        run: |
          set -euo pipefail

          files=()
          while IFS= read -r -d "" file; do
            files+=("$file")
          done < <(find . -type f -name "*.nix" -print0)

          if [ "${#files[@]}" -eq 0 ]; then
            exit 0
          fi

          nix run nixpkgs#nixfmt -- --check "${files[@]}"
